<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
<title>simple settings device settings transparent icon</title>
<desc>Transparent SVG icon for Cowlsly Simple Settings regular device settings launcher zone.</desc>
<defs>
  <radialGradient id="bg" cx="50%" cy="42%" r="60%">
    <stop offset="0" stop-color="#17304d"/>
    <stop offset=".7" stop-color="#071321"/>
    <stop offset="1" stop-color="#020610" stop-opacity=".96"/>
  </radialGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff2a8"/>
    <stop offset=".5" stop-color="#d7a93d"/>
    <stop offset="1" stop-color="#815b18"/>
  </linearGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="9" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<circle cx="256" cy="256" r="190" fill="url(#bg)" stroke="url(#gold)" stroke-width="14" filter="url(#glow)"/>
<rect x="176" y="108" width="160" height="296" rx="28" fill="#081827" stroke="#20f0ff" stroke-width="12"/>
<rect x="206" y="138" width="100" height="18" rx="9" fill="#17304d" stroke="url(#gold)" stroke-width="4"/>
<circle cx="256" cy="286" r="44" fill="none" stroke="url(#gold)" stroke-width="8"/>
<circle cx="256" cy="286" r="10" fill="#20f0ff"/>
<rect x="216" y="356" width="80" height="12" rx="6" fill="#20f0ff" opacity=".8"/>
</svg>